<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>IqUp · „IQ UP! Истражувач" сертификат / certificate</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet" />
<link rel="stylesheet" href="../assessment/tokens-v2.css" />
<style>
/* ============================================================================
   Surface C · the Bibi certificate — 1080×1350 (4:5), the JOYFUL surface.
   The ONE place Bibi appears (as a clearly-marked placeholder box until the
   licensed art drops in). Pure celebration: NO bands, NO scores, NO indices,
   NO pentagon-as-data. The optional child name is BROWSER-ONLY.
   ============================================================================ */
:root{ --cert-w:1080px; --cert-h:1350px; }
body{ margin:0; font-family:var(--font-brand); background:var(--surface-2); color:var(--ink); }

/* ---- the certificate screen (around the artwork) ---- */
.screen{ min-height:100dvh; display:flex; flex-direction:column; align-items:center; gap:var(--space-5); padding:var(--space-6) var(--space-5) var(--space-10); }
.devbar{ display:flex; flex-wrap:wrap; gap:6px 12px; align-items:center; justify-content:center; align-self:stretch;
  padding:7px 12px; background:#2A2440; color:#cfc9e6; font-size:11px; font-weight:700; }
.devbar .grp{ display:inline-flex; gap:6px; align-items:center; }
.devbar button{ font:inherit; cursor:pointer; border:1px solid #4a4366; background:transparent; color:#cfc9e6; padding:4px 10px; border-radius:999px; }
.devbar button[aria-pressed="true"]{ background:var(--ix-learning); color:var(--ix-learning-ink); border-color:var(--ix-learning); }
.screen__intro{ text-align:center; max-width:42ch; }
.screen__intro h1{ font-size:22px; color:var(--ink-head); margin:0 0 6px; }
.screen__intro p{ font-size:14px; color:var(--ink-muted); margin:0; line-height:1.5; }

/* name field — clearly browser-only */
.namebox{ width:min(94vw,460px); background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:var(--space-5); }
.namebox label{ display:block; font-size:13px; font-weight:700; color:var(--ink-head); margin-bottom:8px; }
.namebox input{ width:100%; font-family:var(--font-brand); font-size:16px; font-weight:600; color:var(--ink-head);
  padding:12px 14px; border:2px solid var(--line-strong); border-radius:var(--r-md); background:var(--field); }
.namebox input:focus-visible{ outline:2px solid var(--focus); outline-offset:1px; border-color:var(--action); }
.namebox .priv{ display:flex; gap:8px; align-items:flex-start; margin-top:10px; font-size:12px; color:var(--ink-muted); line-height:1.45; }
.namebox .priv svg{ color:var(--success); flex:0 0 auto; margin-top:1px; }

/* scaled stage */
.stage{ width:min(94vw,460px); }
.cert-scaler{ transform-origin:top left; }

.actions{ display:flex; gap:var(--space-3); flex-wrap:wrap; justify-content:center; }
.btn{ font-family:var(--font-brand); font-weight:600; font-size:15px; min-height:var(--tap-comfort); padding:0 var(--space-6);
  display:inline-flex; align-items:center; justify-content:center; gap:var(--space-2); border:0; border-radius:var(--r-badge); cursor:pointer; }
.btn:focus-visible{ outline:2px solid var(--focus); outline-offset:2px; box-shadow:var(--focus-ring); }
.btn--primary{ background:var(--action); color:#fff; box-shadow:var(--elev-cta); }
.btn--primary:hover{ background:var(--action-hover); }
.btn--ghost{ background:transparent; color:var(--action-ink); box-shadow:inset 0 0 0 2px var(--line-strong); }
.btn svg{ width:19px; height:19px; }
.lang{ display:inline-flex; padding:3px; gap:2px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-pill); }
.lang button{ font:inherit; font-weight:700; font-size:13px; min-width:40px; min-height:36px; border:0; background:transparent; color:var(--ink-muted); border-radius:var(--r-pill); cursor:pointer; }
.lang button[aria-pressed="true"]{ background:var(--bg); color:var(--ink-head); box-shadow:var(--elev-raise); }

/* ===================== THE CERTIFICATE ARTWORK (1080×1350) ================= */
.cert{ width:var(--cert-w); height:var(--cert-h); position:relative; overflow:hidden;
  background:var(--ix-learning-tint); color:var(--ink); }
/* deep playful frame inset */
.cert__frame{ position:absolute; inset:34px; border-radius:48px; background:var(--surface); overflow:hidden;
  box-shadow:0 0 0 10px var(--action), 0 0 0 22px var(--ix-learning); }
.cert__inner{ position:absolute; inset:34px; display:flex; flex-direction:column; align-items:center;
  padding:84px 80px 72px; text-align:center; }

/* decorative waves + blobs + confetti (flat, no gradients) */
.cw{ position:absolute; left:0; right:0; width:100%; }
.cw--top{ top:0; } .cw--bot{ bottom:0; }
.blob{ position:absolute; opacity:.5; }
.confetti{ position:absolute; inset:0; pointer-events:none; }
.confetti i{ position:absolute; display:block; }
.confetti i.dot{ border-radius:50%; }
.confetti i.bar{ border-radius:3px; }

/* header */
.cert__head{ position:relative; z-index:2; display:flex; align-items:center; justify-content:space-between; width:100%; }
.cwordmark{ display:inline-flex; align-items:center; gap:.04em; font-weight:800; font-size:40px; }
.cwordmark .iq{ color:var(--action); } .cwordmark .up{ color:var(--ink-head); }
.cwordmark .b{ background:var(--ix-learning); color:var(--ix-learning-ink); width:1.05em; height:1.3em; display:inline-grid; place-items:center; border-radius:10px; margin-left:.06em; }
.cert__tag{ font-size:18px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--action-ink); background:var(--action-tint); padding:9px 20px; border-radius:999px; }

/* the EXPLORER stamp */
.stamp{ position:relative; z-index:2; margin-top:30px; }
.stamp .ribbon{ display:inline-flex; align-items:center; gap:14px; background:var(--action); color:#fff; padding:14px 34px; border-radius:999px; font-size:26px; font-weight:800; letter-spacing:.04em; }
.stamp .ribbon svg{ width:30px; height:30px; }
.stamp .title{ font-size:74px; font-weight:800; line-height:.98; color:var(--ink-head); margin-top:22px; letter-spacing:-.01em; }
.stamp .title em{ font-style:normal; color:var(--action); }

/* Bibi placeholder box */
.bibi{ position:relative; z-index:2; width:420px; height:420px; margin:34px 0 26px; border-radius:40px;
  border:4px dashed var(--action-soft); background:var(--action-tint);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--action-ink); }
.bibi .sil{ width:170px; height:180px; position:relative; }
.bibi .sil .body{ position:absolute; left:50%; transform:translateX(-50%); bottom:0; width:120px; height:120px; border-radius:60px 60px 54px 54px; background:var(--action-soft); }
.bibi .sil .ear{ position:absolute; top:6px; width:42px; height:54px; border-radius:50%; background:var(--action-soft); }
.bibi .sil .ear.l{ left:14px; transform:rotate(-16deg); } .bibi .sil .ear.r{ right:14px; transform:rotate(16deg); }
.bibi .note{ font-size:20px; font-weight:800; }
.bibi .sub{ font-size:14px; font-weight:600; opacity:.8; max-width:24ch; }

/* name block */
.who{ position:relative; z-index:2; margin-top:4px; }
.who .pre{ font-size:22px; font-weight:600; color:var(--ink-muted); }
.who .name{ font-size:64px; font-weight:800; color:var(--action); line-height:1; margin:8px 0; letter-spacing:-.01em; }
.who .line{ font-size:26px; font-weight:700; color:var(--ink-head); max-width:24ch; margin:0 auto; line-height:1.2; }

/* footer */
.cert__foot{ position:relative; z-index:2; margin-top:auto; display:flex; align-items:center; justify-content:space-between; width:100%; }
.cert__foot .date{ font-size:18px; font-weight:600; color:var(--ink-muted); }
.cert__foot .from{ font-size:18px; font-weight:700; color:var(--action-ink); display:inline-flex; gap:8px; align-items:center; }
.cert__foot .from svg{ width:20px; height:20px; color:var(--ix-learning); }

/* embed mode: just the artwork */
body.embed{ background:transparent; }
body.embed .devbar, body.embed .screen__intro, body.embed .namebox, body.embed .lang, body.embed .actions{ display:none; }
body.embed .screen{ padding:0; gap:0; min-height:0; }
body.embed .stage{ width:auto; }
</style>
</head>
<body>
  <div class="devbar" aria-hidden="true">
    <span class="grp"><b>Lang:</b><button data-lang="mk" aria-pressed="true">МК</button><button data-lang="en">EN</button></span>
    <span class="grp"><b>State:</b><button data-state="named" aria-pressed="true">named</button><button data-state="unnamed">unnamed</button></span>
  </div>

  <div class="screen">
    <div class="screen__intro">
      <h1 data-i="screen_h"></h1>
      <p data-i="screen_p"></p>
    </div>

    <div class="namebox">
      <label for="childName" data-i="name_label"></label>
      <input id="childName" type="text" autocomplete="off" maxlength="24" />
      <div class="priv">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 1 1 8 0v3"/></svg>
        <span data-i="name_priv"></span>
      </div>
    </div>

    <div class="lang" role="group" aria-label="Language / Јазик">
      <button data-lang="mk" aria-pressed="true">МК</button>
      <button data-lang="en" aria-pressed="false">EN</button>
    </div>

    <div class="stage">
      <div class="cert-scaler" id="scaler">
        <!-- ARTWORK -->
        <div class="cert" id="cert" data-named="true">
          <div class="cert__frame"></div>
          <!-- decoration -->
          <svg class="cw cw--top" viewBox="0 0 1080 120" preserveAspectRatio="none" aria-hidden="true" style="height:120px;"><path fill="var(--ix-logic-tint)" d="M0 0 H1080 V64 C880 104 720 40 540 64 C360 88 200 40 0 72 Z"/></svg>
          <svg class="cw cw--bot" viewBox="0 0 1080 120" preserveAspectRatio="none" aria-hidden="true" style="height:120px;"><path fill="var(--ix-memory-tint)" d="M0 120 H1080 V56 C880 16 720 80 540 56 C360 32 200 80 0 48 Z"/></svg>
          <div class="confetti" id="confetti" aria-hidden="true"></div>

          <div class="cert__inner">
            <div class="cert__head">
              <span class="cwordmark"><span class="iq">IQ</span><span class="up">UP</span><span class="b">!</span></span>
              <span class="cert__tag" data-i="cert_tag"></span>
            </div>

            <div class="stamp">
              <span class="ribbon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.6 6.6L21.5 9l-5.2 4.4 1.8 6.6L12 16.7 5.9 20l1.8-6.6L2.5 9l6.9-.4z"/></svg><span data-i="ribbon"></span></span>
              <div class="title" data-i-html="big"></div>
            </div>

            <div class="bibi" role="img" aria-label="Bibi character placeholder">
              <div class="sil" aria-hidden="true"><span class="ear l"></span><span class="ear r"></span><span class="body"></span></div>
              <span class="note" data-i="bibi_note"></span>
              <span class="sub" data-i="bibi_sub"></span>
            </div>

            <div class="who">
              <div class="pre" data-i="who_pre" id="whoPre"></div>
              <div class="name" id="whoName"></div>
              <div class="line" id="whoLine"></div>
            </div>

            <div class="cert__foot">
              <span class="date" id="certDate"></span>
              <span class="from"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.6 6.6L21.5 9l-5.2 4.4 1.8 6.6L12 16.7 5.9 20l1.8-6.6L2.5 9l6.9-.4z"/></svg><span data-i="from"></span></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn--primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg><span data-i="dl"></span></button>
      <button class="btn btn--ghost"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg><span data-i="sh"></span></button>
    </div>
  </div>

<script>
const qp = new URLSearchParams(location.search);
let lang = qp.get('lang')==='en' ? 'en' : 'mk';
let named = qp.get('state') ? qp.get('state')==='named' : true;
const embed = qp.get('embed')==='1';
let presetName = qp.get('name') || '';
if(embed) document.body.classList.add('embed');

const COPY = {
  mk:{
    screen_h:'Готов сертификат!', screen_p:'Радосен спомен од авантурата. Додадете го името на детето ако сакате, па преземете или споделете.',
    name_label:'Име на детето (по желба)',
    name_priv:'Името останува само на овој уред — не се зачувува и не се споделува.',
    cert_tag:'Сертификат',
    ribbon:'IQ UP!', big:'ИСТРАЖУВАЧ',
    bibi_note:'Биби стои тука', bibi_sub:'Лиценцираната илустрација се додава подоцна',
    who_pre:'Доделено на', who_line:'Еден љубопитен ум што ја заврши авантурата!',
    from:'Од светот на Биби · IqUp', dl:'Преземи', sh:'Сподели',
    date:'Скопје · јуни 2026',
  },
  en:{
    screen_h:'Your certificate is ready!', screen_p:"A joyful keepsake from the adventure. Add your child's name if you like, then download or share.",
    name_label:"Child's name (optional)",
    name_priv:'The name stays on this device only — never stored, never shared.',
    cert_tag:'Certificate',
    ribbon:'IQ UP!', big:'EXPLORER',
    bibi_note:'Bibi goes here', bibi_sub:'Licensed illustration drops in later',
    who_pre:'Awarded to', who_line:'A curious mind who finished the adventure!',
    from:'From the world of Bibi · IqUp', dl:'Download', sh:'Share',
    date:'Skopje · June 2026',
  }
};

const $ = s=>document.querySelector(s);
function render(){
  const c = COPY[lang];
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i]').forEach(el=>{ if(c[el.dataset.i]!==undefined) el.textContent=c[el.dataset.i]; });
  document.querySelectorAll('[data-i-html]').forEach(el=>{ el.innerHTML=c[el.dataset.iHtml]??''; });

  const nameVal = ($('#childName').value || presetName).trim();
  const cert = $('#cert');
  const hasName = named && nameVal.length>0;
  cert.dataset.named = String(hasName);

  // name block — named vs unnamed both hold the layout
  $('#whoName').style.display = hasName ? '' : 'none';
  if(hasName){
    $('#whoName').textContent = nameVal;
    $('#whoPre').textContent = c.who_pre;
    $('#whoLine').textContent = c.who_line;
  } else {
    $('#whoPre').textContent = '';
    $('#whoLine').textContent = c.who_line;
  }

  $('#certDate').textContent = c.date;

  document.querySelectorAll('[data-lang]').forEach(b=>b.setAttribute('aria-pressed', String(b.dataset.lang===lang)));
  document.querySelectorAll('[data-state]').forEach(b=>b.setAttribute('aria-pressed', String((b.dataset.state==='named')===named)));
  fit();
}

function fit(){
  if(embed) return;
  const stage = $('.stage'); const scaler = $('#scaler');
  const scale = stage.clientWidth / 1080;
  scaler.style.transform = `scale(${scale})`;
  stage.style.height = (1350*scale) + 'px';
}

// confetti (flat shapes, brand hues)
(function(){
  const COL=['var(--ix-logic)','var(--ix-spatial)','var(--ix-memory)','var(--ix-planning)','var(--ix-learning)','var(--action)'];
  const items=[]; let seed=7;
  const rnd=()=>{ seed=(seed*9301+49297)%233280; return seed/233280; };
  for(let i=0;i<26;i++){
    const x=Math.round(rnd()*1000)+40, y=Math.round(rnd()*1180)+40;
    const inMid = y>210 && y<1060; if(inMid && rnd()<.82) continue; // keep centre clear
    const s=10+Math.round(rnd()*16), col=COL[i%COL.length], bar=rnd()<.4;
    const rot=Math.round(rnd()*360);
    items.push(`<i class="${bar?'bar':'dot'}" style="left:${x}px;top:${y}px;width:${bar?s*1.8:s}px;height:${s}px;background:${col};transform:rotate(${rot}deg);opacity:.85"></i>`);
  }
  $('#confetti').innerHTML=items.join('');
})();

$('#childName').addEventListener('input', render);
document.querySelectorAll('[data-lang]').forEach(b=>b.addEventListener('click',()=>{ lang=b.dataset.lang; render(); }));
document.querySelectorAll('[data-state]').forEach(b=>b.addEventListener('click',()=>{ named=b.dataset.state==='named'; if(!named) $('#childName').value=''; else if(!$('#childName').value) $('#childName').value = lang==='en'?'Maya':'Ива'; render(); }));
window.addEventListener('resize', fit);

if(presetName) $('#childName').value = presetName;
else $('#childName').value = lang==='en'?'Maya':'Ива';
render();
</script>
</body>
</html>
